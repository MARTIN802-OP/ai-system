<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f0f0f;
            color: white;
        }

        .chat-box {
            height: 70vh;
            overflow-y: auto;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
        }

        .msg {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .user {
            background: #0d6efd;
            text-align: right;
        }

        .ai {
            background: #333;
        }

        .input-box {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-left: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h3 class="text-center">🤖 AI Chat System</h3>

    <div id="chat" class="chat-box"></div>

    <div class="input-box">
        <input id="message" placeholder="Écris ton message...">
        <button class="btn btn-primary" onclick="sendMessage()">Envoyer</button>
    </div>

</div>

<script>
const API_URL = "http://127.0.0.1:8000";

async function sendMessage() {

    const message = document.getElementById("message").value.trim();
    if (!message) return;

    addMessage("user", message);

    document.getElementById("message").value = "";

    const response = await fetch(`${API_URL}/send-message`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            sender: "user",
            receiver: "orchestrator",
            task: "chat",
            content: message
        })
    });

    const data = await response.json();

    addMessage("ai", data.message.content);
}

function addMessage(type, text) {

    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.classList.add("msg", type);
    div.innerText = text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
